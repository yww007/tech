<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术文档 | Tech Docs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --container-bg: white;
            --text-color: #333;
            --nav-bg: white;
            --nav-text: #333;
            --border-color: rgba(0,0,0,0.1);
            --bg-image: url('images/website-background-8k.png');
        }

        .dark-mode {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --container-bg: #1a1a2e;
            --text-color: #e0e0e0;
            --nav-bg: #1f1f38;
            --nav-text: #e0e0e0;
            --border-color: rgba(255,255,255,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-image) no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-color);
            transition: color 0.3s;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.85);
            z-index: -1;
        }

        .dark-mode body::before {
            background: rgba(26, 26, 46, 0.85);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--container-bg);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: var(--nav-bg);
            border-bottom: 1px solid var(--border-color);
            transition: background 0.3s, color 0.3s;
        }

        .navbar-brand {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--nav-text);
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .nav-links a {
            color: var(--nav-text);
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #667eea;
        }

        .nav-links a.active {
            color: #667eea;
            font-weight: bold;
        }

        .content {
            padding: 40px 30px;
        }

        .content h1 {
            font-size: 2.5em;
            margin-bottom: 30px;
            color: var(--text-color);
        }

        .content h2 {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .content p {
            line-height: 1.8;
            margin-bottom: 15px;
            color: var(--text-color);
        }

        .content ul {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .content li {
            margin-bottom: 10px;
            color: var(--text-color);
        }

        .content code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .content pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 15px;
        }

        .content pre code {
            background: none;
            padding: 0;
        }

        .dark-mode-toggle {
            cursor: pointer;
            padding: 10px 15px;
            background: #e8f4f8;
            border: none;
            border-radius: 8px;
            color: #1976d2;
            font-size: 1em;
            transition: background 0.3s, color 0.3s;
        }

        .dark-mode-toggle:hover {
            background: #667eea;
            color: white;
        }

        footer {
            background: var(--nav-bg);
            padding: 20px 30px;
            text-align: center;
            color: var(--nav-text);
            border-top: 1px solid var(--border-color);
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <a href="index.html" class="navbar-brand">📚 技术文档</a>
            <ul class="nav-links">
                <li><a href="index.html" class="active">首页</a></li>
                <li><a href="history.html">历史</a></li>
                <li><a href="about.html">关于</a></li>
                <li><a href="contact.html">联系</a></li>
            </ul>
            <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙</button>
        </nav>

        <div class="content">
                                                            <h2>今日推荐-2026年04月01日</h2>

            <div style="background: linear-gradient(145deg, #f6f8fa 0%, #ffffff 100%); padding: 30px; border-radius: 12px; margin-bottom: 30px; border: 2px solid #667eea;">
                <img src="images/tech_101.png" alt="数据库优化策略" style="width: 100%; max-height: 300px; object-fit: cover; border-radius: 8px; margin-bottom: 20px;">
                <h3 style="color: #667eea; margin-bottom: 15px; font-size: 1.5em;">数据库优化策略</h3>
                <p style="margin-bottom: 15px;">本文将详细介绍数据库优化策略的相关知识，包括基本概念、实践技巧和最佳实践。</p>
                <p style="margin-bottom: 15px;"><strong>主要内容：</strong></p>
                <ul style="margin-left: 20px; margin-bottom: 15px;">
                    <li>基本概念 - 核心概念和关键术语</li>
                    <li>实践技巧 - 基础技巧和高级技巧</li>
                    <li>最佳实践 - 开发规范和部署策略</li>
                    <li>代码示例 - 实用的代码示例</li>
                    <li>常见问题 - 常见问题和解决方案</li>
                </ul>
                <a href="history/2026/04/20260401.html" style="color: #667eea; font-weight: bold;">阅读完整文章 →</a>
            </div>

            <h2>历史存档</h2>

            <p>所有历史内容都保存在历史页面中，您可以随时查看。</p>

            <p><a href="history.html" style="color: #667eea;">查看历史存档 →</a></p>
        </div>

        <footer>
            <p>&copy; 2026 技术文档 | GitHub Pages</p>
        </footer>
    </div>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }

        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
